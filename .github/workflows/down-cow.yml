name: Herd alert checks

# Hourly safety checks on the collared herd:
#   1. Down-cow  — cows that haven't moved for longer than the configured
#                  window (settings.down_cow_hours).
#   2. Geofence  — cows whose latest fix is outside the drawn fence.
# Both email an alert and reuse the same secrets as the weekly reminder.
on:
  schedule:
    - cron: "17 * * * *"     # hourly (GitHub may delay/skip on free tier)
  workflow_dispatch:            # run on demand from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      REMINDER_TO:          ${{ secrets.REMINDER_TO }}
      REMINDER_FROM:        ${{ secrets.REMINDER_FROM }}
      SMTP_HOST:            ${{ secrets.SMTP_HOST }}
      SMTP_PORT:            ${{ secrets.SMTP_PORT }}
      SMTP_USER:            ${{ secrets.SMTP_USER }}
      SMTP_PASS:            ${{ secrets.SMTP_PASS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install nodemailer
      - name: Check for down cows
        run: node scripts/check-down-cows.js
      - name: Check the geofence
        if: always()          # run even if the down-cow step reported an issue
        run: node scripts/check-geofence.js
