name: Poll Hologram -> Supabase

# Pulls new GPS messages from Hologram's API and writes them to Supabase.
# Replaces Hologram's beta "Alerts" webhook, which doesn't fire reliably.
on:
  schedule:
    - cron: "*/5 * * * *"     # every 5 minutes (GitHub Actions minimum cadence)
  workflow_dispatch:            # lets you run it on demand from the Actions tab

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Poll Hologram and insert fixes
        run: node poll-hologram.js
        env:
          HOLOGRAM_API_KEY: ${{ secrets.HOLOGRAM_API_KEY }}
          HOLOGRAM_DEVICE_ID: ${{ secrets.HOLOGRAM_DEVICE_ID }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
