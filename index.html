<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4a6b3a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chenault Cattle" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <title>Chenault Cattle Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== Login screen ===== -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <div class="login-logo">🐄</div>
      <h1>Chenault Cattle Tracker</h1>
      <p class="muted">Sign in to your herd</p>
      <form id="login-form">
        <input id="login-email" type="email" placeholder="Email" autocomplete="username" required />
        <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" required />
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>
      <p id="login-error" class="error hidden"></p>
    </div>
  </div>

  <!-- ===== App shell ===== -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <span id="topbar-title">Dashboard</span>
      <span class="topbar-right">
        <span id="sync-pill" class="pill" title="Tap to sync"></span>
        <button id="signout-btn" class="link-btn" title="Sign out">Sign out</button>
      </span>
    </header>

    <main id="view" class="view"><!-- rendered by app.js --></main>

    <nav class="tabbar">
      <button class="tab" data-tab="dashboard"><span class="ico">📊</span><span>Home</span></button>
      <button class="tab" data-tab="add"><span class="ico">➕</span><span>Add Calf</span></button>
      <button class="tab" data-tab="herd"><span class="ico">🐄</span><span>Herd</span></button>
      <button class="tab" data-tab="map"><span class="ico">📍</span><span>Map</span></button>
      <button class="tab" data-tab="market"><span class="ico">📈</span><span>Market</span></button>
    </nav>
  </div>

  <!-- ===== Loading splash ===== -->
  <div id="splash" class="splash"><div class="spinner"></div></div>

  <!-- Libraries (no build step needed) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="config.js"></script>
  <script src="offline.js"></script>
  <script src="app.js"></script>
</body>
</html>
